<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Olyan Farma</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #e2e8f0;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .error-desc {
            color: #718096;
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 40px;
        }
        .btn-back {
            background-color: #8abac5;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-back:hover {
            background-color: #72a1ac;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">OLYAN <span>FARMA</span></div>
        </div>
    </nav>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Parece que esta fórmula no existe.</h1>
        <p class="error-desc">La página que buscas no se encuentra en nuestro vademécum actual. Pero no te preocupes, podemos ayudarte a encontrar tu tratamiento ideal.</p>
        <a href="index.html" class="btn-back">Volver al Autodiagnóstico</a>
    </div>

</body>
</html>
